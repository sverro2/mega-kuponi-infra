---
- name: Create letsencrypt directory structure per domain
  file:
    path: /etc/letsencrypt/live/{{ item }}
    state: directory
    mode: "0755"
  loop: "{{ nginx_active_domains + nginx_disabled_domains }}"

- name: Generate placeholder self-signed certificate per domain
  command: >
    openssl req -x509 -nodes -newkey rsa:2048 -days 1 -subj '/CN=placeholder'
    -keyout /etc/letsencrypt/live/{{ item }}/privkey.pem
    -out /etc/letsencrypt/live/{{ item }}/fullchain.pem
  args:
    creates: /etc/letsencrypt/live/{{ item }}/fullchain.pem
  loop: "{{ nginx_active_domains + nginx_disabled_domains }}"

- name: Check DH params file
  stat:
    path: /etc/letsencrypt/ssl-dhparams.pem
  register: dhparams_stat

- name: Generate placeholder DH params
  command: openssl dhparam -out /etc/letsencrypt/ssl-dhparams.pem 2048
  when: not dhparams_stat.stat.exists or dhparams_stat.stat.size == 0

- name: Create placeholder options-ssl-nginx.conf
  file:
    path: /etc/letsencrypt/options-ssl-nginx.conf
    state: touch
    mode: "0644"
    modification_time: preserve
    access_time: preserve

- name: Ensure certbot renewal timer is enabled
  systemd:
    name: certbot.timer
    enabled: true
    state: started
