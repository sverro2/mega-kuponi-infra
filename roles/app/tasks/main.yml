---
- name: Create required directories
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - {
        path: "{{ app_deploy_dir }}",
        owner: root,
        group: "{{ runner_user }}",
        mode: "0755",
      }
    - {
        path: "{{ app_admin_deploy_dir }}",
        owner: root,
        group: "{{ runner_user }}",
        mode: "0755",
      }
    - {
        path: "{{ app_resources_dir }}",
        owner: "{{ runner_user }}",
        group: "{{ editors_group }}",
        mode: "0775",
      }
    - {
        path: "{{ app_source_dir }}",
        owner: root,
        group: root,
        mode: "0755",
      }

- name: Check if static path is a plain directory (not a symlink)
  stat:
    path: "{{ app_deploy_dir }}/static"
  register: static_stat

- name: Remove static directory if it is not a symlink
  file:
    path: "{{ app_deploy_dir }}/static"
    state: absent
  when: static_stat.stat.exists and not static_stat.stat.islnk

- name: Symlink static directory for Rocket FileServer (nginx serves actual content in production)
  file:
    src: "{{ app_resources_dir }}"
    dest: "{{ app_deploy_dir }}/static"
    state: link

- name: Install rustup
  shell: >
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --default-toolchain none
  args:
    creates: /opt/cargo/bin/rustup
  environment:
    CARGO_HOME: /opt/cargo
    RUSTUP_HOME: /opt/rustup

- name: Install Rust {{ rust_version }}
  command: /opt/cargo/bin/rustup toolchain install {{ rust_version }} --profile minimal
  environment:
    CARGO_HOME: /opt/cargo
    RUSTUP_HOME: /opt/rustup
  register: rustup_install
  changed_when: "'installed' in rustup_install.stdout"

- name: Set default Rust toolchain to {{ rust_version }}
  command: /opt/cargo/bin/rustup default {{ rust_version }}
  environment:
    CARGO_HOME: /opt/cargo
    RUSTUP_HOME: /opt/rustup
  changed_when: false

- name: Install Node.js via snap
  community.general.snap:
    name: node
    classic: true
    state: present

- name: Deploy update script
  template:
    src: update.sh.j2
    dest: /usr/local/bin/deploy
    owner: root
    group: root
    mode: "0755"

- name: Deploy smoke-test script
  copy:
    src: ftl-validation/run.sh
    dest: /usr/local/bin/smoke-test
    owner: root
    group: root
    mode: "0755"

- name: Deploy smoke-test-quick script
  copy:
    src: ftl-validation/test-quick.sh
    dest: /usr/local/bin/smoke-test-quick
    owner: root
    group: root
    mode: "0755"

- name: Deploy FTL validation config
  copy:
    src: ftl-validation/config/
    dest: /opt/megakuponi/ftl-validation/config/
    owner: root
    group: root
    mode: preserve

- name: Deploy Rocket.toml to backend working directory
  template:
    src: Rocket.toml.j2
    dest: "{{ app_deploy_dir }}/Rocket.toml"
    owner: root
    group: "{{ runner_user }}"
    mode: "0644"

- name: Check if admin repo is cloned
  stat:
    path: "{{ app_admin_dir }}/.git"
  register: admin_repo_stat

- name: Deploy .env to admin source directory (needed at build time)
  template:
    src: admin.env.j2
    dest: "{{ app_admin_dir }}/.env"
    owner: "{{ ana_user }}"
    group: "{{ ana_user }}"
    mode: "0644"
  when: admin_repo_stat.stat.exists

- name: Allow git operations in any directory
  community.general.git_config:
    name: safe.directory
    value: "*"
    scope: system

- name: Allow any user to run deploy scripts via sudo without password
  copy:
    content: |
      ALL ALL=(root) NOPASSWD: /usr/local/bin/deploy
      ALL ALL=(root) NOPASSWD: /usr/local/bin/backup
      ALL ALL=(root) NOPASSWD: /usr/local/bin/restore
      ALL ALL=(root) NOPASSWD: /usr/local/bin/grant-db-permissions
    dest: /etc/sudoers.d/megakuponi-deploy
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
