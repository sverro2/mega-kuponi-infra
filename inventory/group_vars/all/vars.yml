# Non-secret variables. Secrets go in vault.yml (ansible-vault encrypted).

runner_user: runner
runner_uid: 1001
runner_gid: 1001
ana_user: ana
ana_uid: 1000
ana_gid: 1000
editors_group: editors
editors_gid: 1002

ssh_port: 6699
server_timezone: Europe/Amsterdam
rust_version: "1.93.1"

app_backend_repo: git@github.com:sverro2/mega-kuponi.git
app_admin_repo: git@github.com:sverro2/mega-kuponi-administration.git

app_source_dir: /home/ana/source
app_backend_dir: "{{ app_source_dir }}/mega-kuponi"
app_admin_dir: "{{ app_source_dir }}/mega-kuponi-administration"

app_deploy_dir: /var/www/application
app_admin_deploy_dir: /var/www/admin-app
app_resources_dir: /var/www/resources
deploy_keys_dir: /etc/megakuponi/keys

postgres_db: megakuponi
postgres_app_user: dev
postgres_content_user: ana
postgres_content_user_writable_tables:
  - categories
  - subcategories
  - users

restic_repo_base: "s3:hel1.your-objectstorage.com/megakuponibackup"
restic_repo: "{{ restic_repo_base }}/production"
restic_config_dir: /etc/restic
restore_ssl_from_backup: true

nginx_active_domains:
  - megacupones.cl
  - megacupones.co
  - megacupones.com.mx
  - megacupones.pe
  - megakuponi.hr
  - megakuponi.rs
  - megakuponi.si
  - megakuponi.ba
  - megakupony.com.ua
  - megakupony.kz
  - megacupones.uy
  - megacupones.ar
  - animamedia.nl

nginx_disabled_domains:
  - megacupones.com.py
  - megacupones.com.bo

nginx_admin_domain: animamedia.nl
nginx_backend_port: 8000
nginx_admin_port: 3000

admin_email: brettschneider.sven@gmail.com

swap_size: 8G

# Automatic security updates and reboots
auto_updates_enabled: true
auto_reboot_enabled: true
auto_reboot_day: 1      # day of month (1 = first day)
auto_reboot_time: "03:30"  # time of reboot (after backup at 03:00)
