---
# Run this ONCE after the first ansible-playbook site.yml on a fresh server.
#
# Fresh setup (DNS already pointing to new server):
#   ansible-playbook playbooks/bootstrap.yml --ask-vault-pass
#
# Migration from old server (DNS still pointing to old server):
#   ansible-playbook playbooks/bootstrap.yml --ask-vault-pass -e restic_repo=<production-repo>
#   SSL certificates are restored from the backup — no DNS needed.
#   Switch DNS after verifying the new server works.

- name: Bootstrap fresh server
  hosts: all
  become: true

  tasks:

    # -------------------------------------------------------------------------
    # 1. Clone source repositories
    # -------------------------------------------------------------------------

    - name: Check if repos are already cloned
      stat:
        path: "{{ item }}/.git"
      loop:
        - "{{ app_backend_dir }}"
        - "{{ app_admin_dir }}"
      register: repo_stats

    - name: Remove directories that are not git repos (leftover from failed runs)
      file:
        path: "{{ item.item }}"
        state: absent
      loop: "{{ repo_stats.results }}"
      when: not item.stat.exists

    - name: Clone backend repo
      git:
        repo: "{{ app_backend_repo }}"
        dest: "{{ app_backend_dir }}"
        version: main
        key_file: "{{ deploy_keys_dir }}/id-dev"
        accept_hostkey: true

    - name: Clone admin repo
      git:
        repo: "{{ app_admin_repo }}"
        dest: "{{ app_admin_dir }}"
        version: main
        key_file: "{{ deploy_keys_dir }}/id-dev-admin"
        accept_hostkey: true

    - name: Deploy admin .env (needed for build)
      template:
        src: ../roles/app/templates/admin.env.j2
        dest: "{{ app_admin_dir }}/.env"
        owner: root
        group: root
        mode: "0644"

    # -------------------------------------------------------------------------
    # 2. Restore from backup (database, resources, and SSL certificates)
    #    Restoring /etc/letsencrypt from backup means certbot is not needed
    #    during migration — the existing valid certs are already there.
    # -------------------------------------------------------------------------

    - name: Create restore temp directory
      file:
        path: /tmp/restic-restore
        state: directory
        mode: "0755"

    - name: Restore database dump from backup
      command: >
        restic restore latest
        --target /tmp/restic-restore
        --include /tmp/db.dump
      environment:
        RESTIC_REPOSITORY: "{{ restic_repo }}"
        AWS_ACCESS_KEY_ID: "{{ vault_restic_aws_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ vault_restic_aws_secret_key }}"
        RESTIC_PASSWORD: "{{ vault_restic_password }}"

    - name: Stop backend service before database restore
      systemd:
        name: mega-kuponi
        state: stopped
      ignore_errors: true

    - name: Drop existing database
      command: dropdb --if-exists {{ postgres_db }}
      become_user: postgres

    - name: Create fresh database
      command: createdb -E UTF8 {{ postgres_db }}
      become_user: postgres

    - name: Restore database dump into PostgreSQL
      command: pg_restore -d {{ postgres_db }} /tmp/restic-restore/tmp/db.dump
      become_user: postgres

    - name: Clean up restore temp directory
      file:
        path: /tmp/restic-restore
        state: absent

    - name: Restore resources from backup
      command: >
        restic restore latest
        --target /
        --include {{ app_resources_dir }}
      environment:
        RESTIC_REPOSITORY: "{{ restic_repo }}"
        AWS_ACCESS_KEY_ID: "{{ vault_restic_aws_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ vault_restic_aws_secret_key }}"
        RESTIC_PASSWORD: "{{ vault_restic_password }}"

    - name: Restore SSL certificates from backup
      command: >
        restic restore latest
        --target /
        --include /etc/letsencrypt
      environment:
        RESTIC_REPOSITORY: "{{ restic_repo }}"
        AWS_ACCESS_KEY_ID: "{{ vault_restic_aws_access_key }}"
        AWS_SECRET_ACCESS_KEY: "{{ vault_restic_aws_secret_key }}"
        RESTIC_PASSWORD: "{{ vault_restic_password }}"
      when: restore_ssl_from_backup

    - name: Fix ownership on resources directory
      file:
        path: "{{ app_resources_dir }}"
        owner: "{{ runner_user }}"
        group: "{{ editors_group }}"
        recurse: true

    # -------------------------------------------------------------------------
    # 3. Obtain SSL certificates (only if not restored from backup)
    # -------------------------------------------------------------------------

    - name: Check if a valid Let's Encrypt certificate exists for first domain
      command: >
        openssl x509 -in /etc/letsencrypt/live/{{ nginx_active_domains | first }}/fullchain.pem
        -noout -issuer
      register: cert_check
      ignore_errors: true
      changed_when: false

    - name: Stop nginx so certbot can bind to port 80
      systemd:
        name: nginx
        state: stopped
      when: not restore_ssl_from_backup and (cert_check.rc != 0 or "Let's Encrypt" not in cert_check.stdout)

    - name: Remove placeholder certificate directories so certbot uses expected names
      file:
        path: /etc/letsencrypt/live/{{ item }}
        state: absent
      loop: "{{ nginx_active_domains + nginx_disabled_domains }}"
      when: not restore_ssl_from_backup and (cert_check.rc != 0 or "Let's Encrypt" not in cert_check.stdout)

    - name: Obtain Let's Encrypt certificate per domain
      command: >
        certbot certonly --standalone --non-interactive --agree-tos
        --email {{ admin_email }}
        -d {{ item }} -d www.{{ item }}
      loop: "{{ nginx_active_domains + nginx_disabled_domains }}"
      when: not restore_ssl_from_backup and (cert_check.rc != 0 or "Let's Encrypt" not in cert_check.stdout)

    - name: Start nginx with real certificates
      systemd:
        name: nginx
        state: started
      when: not restore_ssl_from_backup and (cert_check.rc != 0 or "Let's Encrypt" not in cert_check.stdout)

    # -------------------------------------------------------------------------
    # 4. Build and deploy the applications
    # -------------------------------------------------------------------------

    - name: Build and deploy backend and admin panel
      command: /usr/local/bin/deploy --admin --skip-smoke-test
