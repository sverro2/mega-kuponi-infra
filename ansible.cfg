[defaults]
inventory = inventory/hosts.yml
# group_vars/ and host_vars/ live in inventory/ — Ansible searches relative to the inventory file
collections_path = ~/.ansible/collections
remote_user = root
private_key_file = ~/.ssh/id_ed25519
host_key_checking = False
roles_path = roles
# Uncomment after creating .vault_pass (add to .gitignore - already there):
# vault_password_file = .vault_pass

[ssh_connection]
pipelining = True
